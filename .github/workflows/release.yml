name: Make Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version"
        required: true
        default: "1.0.0"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Gradle Wrapper
      run: |
        # Ensure the gradle wrapper is executable
        chmod +x ./gradlew
        # The gradlew script will automatically download the wrapper JAR if needed
        ./gradlew --version
      working-directory: .

    - name: Setup Android SDK
      run: |
        echo "y" | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses
        ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.0" "platform-tools"
      working-directory: .

    - name: Restore keystore from SIGNING_KEY
      run: echo "${{ secrets.SIGNING_KEY }}" | base64 -d > typerx.jks
      working-directory: .

    - name: Build Signed APK
      run: |
        ./gradlew assembleRelease \
        -PminSdk=30 \
        -PversionName=${{ inputs.version }}
      working-directory: .
      env:
        KEYSTORE_FILE: typerx.jks
        KEY_ALIAS: ${{ secrets.ALIAS }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ inputs.version }}
        files: app/build/outputs/apk/release/*.apk