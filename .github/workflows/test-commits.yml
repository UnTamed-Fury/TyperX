name: Test Commits

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to test"
        required: true
        default: "main"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch }}

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android SDK
      run: |
        # Accept licenses first
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
        # Install packages individually to avoid issues
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-33"
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.0" 
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools"

    - name: Set execute permissions for gradlew
      run: chmod +x ./gradlew

    - name: Clean
      run: ./gradlew clean

    - name: Build Release (Android 11+)
      run: ./gradlew assembleRelease -PminSdk=30

    - name: Unit tests
      run: ./gradlew testReleaseUnitTest

    - uses: actions/upload-artifact@v4
      with:
        name: tested-release
        path: app/build/outputs/apk/release/*.apk