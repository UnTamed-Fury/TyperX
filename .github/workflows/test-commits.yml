name: Test Commits

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to test"
        required: true
        default: "main"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch }}

    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Set execute permissions for gradlew
      run: |
        chmod +x $GITHUB_WORKSPACE/gradlew
      shell: bash

    - name: Clean
      run: |
        $GITHUB_WORKSPACE/gradlew clean
      shell: bash

    - name: Build Release (Android 11+)
      run: |
        $GITHUB_WORKSPACE/gradlew assembleRelease -PminSdk=30
      shell: bash

    - name: Unit tests
      run: |
        $GITHUB_WORKSPACE/gradlew testReleaseUnitTest
      shell: bash

    - uses: actions/upload-artifact@v4
      with:
        name: tested-release
        path: app/build/outputs/apk/release/*.apk