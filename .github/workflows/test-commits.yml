name: Test Commits

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to test"
        required: true
        default: "main"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch }}

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Gradle Wrapper
      run: |
        # Ensure the gradle wrapper is executable
        chmod +x ./gradlew
        # Initialize the gradle wrapper to ensure the JAR file exists
        ./gradlew --version || echo "Initial run failed, but wrapper should be initialized"
      working-directory: .

    - name: Setup Android SDK
      run: |
        echo "y" | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses
        ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.0" "platform-tools"
      working-directory: .

    - name: Clean
      run: ./gradlew clean
      working-directory: .

    - name: Build Release (Android 11+)
      run: ./gradlew assembleRelease -PminSdk=30
      working-directory: .

    - name: Unit tests
      run: ./gradlew testReleaseUnitTest
      working-directory: .

    - uses: actions/upload-artifact@v4
      with:
        name: tested-release
        path: app/build/outputs/apk/release/*.apk