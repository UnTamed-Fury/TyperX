name: Pull Request Check

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: |
          platforms;android-33
          build-tools;33.0.0
          platform-tools
        accept-android-sdk-licenses: true
      env:
        SKIP_JDK_VERSION_CHECK: true

    - run: chmod +x ./gradlew
      working-directory: .

    - name: Lint
      run: ./gradlew lint
      working-directory: .

    - name: Unit Tests
      run: ./gradlew test
      working-directory: .

    - name: Build Debug (Android 11+)
      run: ./gradlew assembleDebug -PminSdk=30
      working-directory: .

    - uses: actions/upload-artifact@v4
      with:
        name: pr-debug-apk
        path: app/build/outputs/apk/debug/*.apk