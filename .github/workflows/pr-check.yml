name: Pull Request Check

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android SDK
      run: |
        # Accept licenses first
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
        # Install packages individually to avoid issues
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-33"
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.0" 
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools"

    - name: Set execute permissions for gradlew
      run: chmod +x ./gradlew

    - name: Lint
      run: ./gradlew lint

    - name: Unit Tests
      run: ./gradlew test

    - name: Build Debug (Android 11+)
      run: ./gradlew assembleDebug -PminSdk=30

    - uses: actions/upload-artifact@v4
      with:
        name: pr-debug-apk
        path: app/build/outputs/apk/debug/*.apk