name: Pull Request Check

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew
      working-directory: .

    - name: Setup Android SDK
      run: |
        echo "y" | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses
        ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.0" "platform-tools"
      working-directory: .

    - name: Lint
      run: ./gradlew lint
      working-directory: .

    - name: Unit Tests
      run: ./gradlew test
      working-directory: .

    - name: Build Debug (Android 11+)
      run: ./gradlew assembleDebug -PminSdk=30
      working-directory: .

    - uses: actions/upload-artifact@v4
      with:
        name: pr-debug-apk
        path: app/build/outputs/apk/debug/*.apk