name: Pull Request Check

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Set execute permissions for gradlew
      run: chmod +x ./gradlew

    - name: Lint
      run: ./gradlew lint

    - name: Unit Tests
      run: ./gradlew test

    - name: Build Debug (Android 11+)
      run: ./gradlew assembleDebug -PminSdk=30

    - uses: actions/upload-artifact@v4
      with:
        name: pr-debug-apk
        path: app/build/outputs/apk/debug/*.apk